{% for post in posts %}
  <div style="border: 1px solid #ccc; margin-bottom: 15px; padding: 10px;">
    <p><strong>{{ post.user.email }}</strong></p>
    <p>{{ post.content }}</p>

    {% if post.image %}
      <img src="{{ post.image.url }}" width="200" />
    {% endif %}

    <p>Likes: {{ post.number_of_likes }}</p>

    <form method="post" action="{% url 'toggle_like' post.id %}">
      {% csrf_token %}
      {% if user in post.likes.all %}
        <button type="submit">Unlike</button>
      {% else %}
        <button type="submit">Like</button>
      {% endif %}
    </form>
  </div>
{% endfor %}
